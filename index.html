<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction Demo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide icons for extra flair -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <h1>Dự Đoán Bệnh Tiểu Đường</h1>
        <p class="subtitle">So sánh 3 Mô hình (Random Forest, Logistic, XGBoost)</p>

        <div class="main-content">
            <!-- Form Section -->
            <div class="form-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Thông Số Lâm Sàng</h2>
                    <button id="randomBtn" class="btn-secondary" type="button">Ngẫu Nhiên</button>
                </div>
                <form id="predictionForm" class="form-grid">
                    
                    <div class="input-group">
                        <label for="chol">Cholesterol (chol)</label>
                        <input type="number" id="chol" name="chol" value="200" required>
                    </div>

                    <div class="input-group">
                        <label for="stab_glu">Glucose Ổn Định (stab.glu)</label>
                        <input type="number" id="stab_glu" name="stab_glu" value="90" required>
                    </div>

                    <div class="input-group">
                        <label for="glyhb">Chỉ Số HbA1c (glyhb)</label>
                        <input type="number" id="glyhb" name="glyhb" step="0.1" value="5.0" required>
                    </div>

                    <div class="input-group">
                        <label for="hdl">HDL Cholesterol</label>
                        <input type="number" id="hdl" name="hdl" value="50" required>
                    </div>

                    <div class="input-group">
                        <label for="ratio">Tỷ Lệ Chol/HDL</label>
                        <input type="number" id="ratio" name="ratio" step="0.1" value="4.0" required>
                    </div>

                    <div class="input-group">
                        <label for="age">Tuổi (age)</label>
                        <input type="number" id="age" name="age" value="45" required>
                    </div>

                    <div class="input-group">
                        <label for="gender">Giới Tính</label>
                        <select id="gender" name="gender">
                            <option value="female">Nữ (Female)</option>
                            <option value="male">Nam (Male)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="height">Chiều Cao (inches)</label>
                        <input type="number" id="height" name="height" value="65" required>
                    </div>

                    <div class="input-group">
                        <label for="weight">Cân Nặng (pounds)</label>
                        <input type="number" id="weight" name="weight" value="150" required>
                    </div>

                    <div class="input-group">
                        <label for="bmi">Chỉ Số BMI</label>
                        <input type="number" id="bmi" name="bmi" step="0.1" value="25.0" required>
                    </div>

                    <div class="input-group">
                        <label for="frame">Khung Cơ Thể</label>
                        <select id="frame" name="frame">
                            <option value="medium">Vừa (Medium)</option>
                            <option value="small">Nhỏ (Small)</option>
                            <option value="large">Lớn (Large)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="bp_1s">HA Tâm Thu (bp.1s)</label>
                        <input type="number" id="bp_1s" name="bp_1s" value="120" required>
                    </div>

                    <div class="input-group">
                        <label for="bp_1d">HA Tâm Trương (bp.1d)</label>
                        <input type="number" id="bp_1d" name="bp_1d" value="80" required>
                    </div>

                    <div class="input-group">
                        <label for="waist">Vòng Eo (waist)</label>
                        <input type="number" id="waist" name="waist" value="35" required>
                    </div>

                    <div class="input-group">
                        <label for="hip">Vòng Hông (hip)</label>
                        <input type="number" id="hip" name="hip" value="40" required>
                    </div>

                    <div class="input-group">
                        <label for="time_ppn">Thời Gian Sau Ăn (phút)</label>
                        <input type="number" id="time_ppn" name="time_ppn" value="300" required>
                    </div>

                    <div class="input-group" style="display: none;">
                        <label for="location">Vị Trí</label>
                        <select id="location" name="location">
                            <option value="Buckingham">Buckingham</option>
                            <option value="Louisa">Louisa</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span>Dự Đoán Kết Quả</span>
                    </button>
                </form>
            </div>

            <!-- Result Section -->
            <div class="result-section">
                <h2>Kết Quả Dự Đoán</h2>
                
                <!-- RF Classifier -->
                <div id="predictionResult" class="prediction-box">
                    Chưa có dữ liệu Random Forest
                </div>

                <!-- Logistic Classifier -->
                <div id="logisticResult" class="prediction-box">
                    Chưa có dữ liệu Logistic Regression
                </div>

                <!-- XGBoost Classifier -->
                <div id="xgbResult" class="prediction-box info">
                    Chưa có dữ liệu XGBoost
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
